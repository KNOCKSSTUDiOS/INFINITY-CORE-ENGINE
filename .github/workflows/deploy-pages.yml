name: Deploy static engine to GitHub Pages

# Publishes the root static site (index.html + engine-*.{js,css,html})
# to GitHub Pages on every push to main. Pairs with /CNAME so the
# served domain stays hollywoodimaging.studio.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage publish directory
        run: |
          mkdir -p _site
          # Copy the production static surface only — skip backend/python/node infra.
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='_site' \
            --exclude='app/' \
            --exclude='backend/' \
            --exclude='server/' \
            --exclude='cinema-engine/' \
            --exclude='ENGINE/' \
            --exclude='engine/ai' \
            --exclude='sentinel/' \
            --exclude='pipeline/' \
            --exclude='cinematic/' \
            --exclude='*.py' \
            --exclude='*.tar.gz' \
            --exclude='*.deb' \
            --exclude='package*.json' \
            --exclude='vite.config*' \
            --exclude='next.config*' \
            --exclude='tsconfig*' \
            --exclude='.devcontainer' \
            --exclude='.vscode' \
            --exclude='.env*' \
            ./ _site/
          # Force CNAME presence — required for custom domain.
          cp CNAME _site/CNAME
          # Disable Jekyll so files starting with _ (none today, but future-proof) ship verbatim.
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
