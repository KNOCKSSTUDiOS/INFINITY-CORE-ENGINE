      interval: "daily"
    open-pull-requests-limit: 1
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-type: "all"

  # ───────────────────────────────────────────────
  #  TERRAFORM (INFRASTRUCTURE OPTIONAL)
