    ignore:
      - dependency-type: "all"

  # ───────────────────────────────────────────────
  #  GRADLE (ANDROID / JVM)
  # ───────────────────────────────────────────────
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1
    allow:
      - dependency-type: "direct"
    ignore:
