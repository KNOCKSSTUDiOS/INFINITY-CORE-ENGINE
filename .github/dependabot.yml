  # ───────────────────────────────────────────────
  #  NUGET (.NET MODULES)
  # ───────────────────────────────────────────────
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-type: "all"To get started with Dependabot version updates, you'll need to specify which
