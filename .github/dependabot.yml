# version: 2
updates:
  # ───────────────────────────────────────────────
  #  GITHUB ACTIONS WORKFLOWS (ALL WORKFLOWS)
  # ───────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-type: "all"

  # ───────────────────────────────────────────────
  #  NODE / NPM (ENGINE SCRIPTS, FRONTEND, TOOLS)
  # ───────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 1
    allow:
      - dependency-type: "direct"
    ignore:
      - dependency-type: "all"

  # ───────────────────────────────────────────────
  #  PYTHON / PIP (ENGINE UTILITIES)
