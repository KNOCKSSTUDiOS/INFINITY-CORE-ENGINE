<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>INFINITY-CORE-ENGINE</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <h1>INFINITY-CORE-ENGINE</h1>
    <p>Owner: KNOCKS</p>

    <button id="run">RUN ENGINE</button>
    <pre id="out"></pre>
  </div>

  <script src="engine-core.js"></script>
  <script>
    document.getElementById('run').addEventListener('click', () => {
      const core = window.createInfinityCoreEngine();
      document.getElementById('out').textContent =
        window.formatInfinityCoreEngine(core);
    });
  </script>
</body>
</html>
