<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HollywoodImaging.studio | KNOCKSSTUDiOS MOTiON Pictures</title>
  <link rel="stylesheet" href="studio.css" />
</head>
<body>
  <div id="app">
    <h1>KNOCKSSTUDiOS Hollywood MOTiON Pictures</h1>
    <p class="tagline">HollywoodImaging.studio · Powered by INFINITY-CORE-ENGINE</p>

    <textarea id="scriptInput" placeholder="Paste your story / script here..."></textarea>

    <div class="controls">
      <button id="run">GENERATE CINEMATIC</button>
    </div>

    <pre id="out"></pre>
  </div>

  <!-- Core engine from repo root -->
  <script src="../engine-core.js"></script>

  <!-- Cinema layer modules -->
  <script src="motion-engine.js"></script>
  <script src="atmosphere-engine.js"></script>
  <script src="soundstage-engine.js"></script>
  <script src="logo-engine.js"></script>
  <script src="render-engine.js"></script>
  <script src="studio-engine.js"></script>

  <script>
    document.getElementById('run').addEventListener('click', async () => {
      const script = document.getElementById('scriptInput').value.trim();
      if (!script) {
        document.getElementById('out').textContent = "No script provided.";
        return;
      }
      try {
        const result = await window.runStudioPipeline(script);
        document.getElementById('out').textContent = result;
      } catch (e) {
        document.getElementById('out').textContent = "ENGINE ERROR:\\n" + e.message;
      }
    });
  </script>
</body>
</html>
