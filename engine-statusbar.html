<!-- ============================================================
     INFINITY-CORE-ENGINE // STATUS BAR ENGINE
     Time • Signal • Battery • System Indicators
     ============================================================ -->

<div id="status-bar" class="status-bar">

  <div class="sb-left">
    <span id="sb-signal" class="sb-icon">📶</span>
    <span id="sb-wifi" class="sb-icon">📡</span>
    <span id="sb-bt" class="sb-icon">🔵</span>
  </div>

  <div class="sb-center">
    <span id="sb-time" class="sb-time">00:00</span>
  </div>

  <div class="sb-right">
    <span id="sb-notif" class="sb-icon">•</span>
    <span id="sb-battery" class="sb-icon">🔋 100%</span>
  </div>

</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {

    /* CLOCK */
    function updateStatusTime() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, "0");
      const minutes = now.getMinutes().toString().padStart(2, "0");
      document.getElementById("sb-time").textContent = `${hours}:${minutes}`;
    }

    updateStatusTime();
    setInterval(updateStatusTime, 1000);

    /* BATTERY (SIMULATED) */
    let batteryLevel = 100;
    setInterval(() => {
      batteryLevel = Math.max(0, batteryLevel - 1);
      document.getElementById("sb-battery").textContent = `🔋 ${batteryLevel}%`;
    }, 60000);

    /* NOTIFICATION DOT HOOK */
    window.AscendNotifyDot = (state) => {
      document.getElementById("sb-notif").style.opacity = state ? 1 : 0.2;
    };

    /* SIGNAL + WIFI + BT STATES */
    document.body.addEventListener("data-cc-wifi", () => {
      document.getElementById("sb-wifi").classList.toggle("active");
    });

  });
</script>

<style>
  .status-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 26px;
    background: var(--surface-0);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px;
    border-bottom: 1px solid var(--surface-2);
    z-index: 9999;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  .sb-left, .sb-center, .sb-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sb-icon {
    color: var(--knocks-steel);
  }

  .sb-time {
    color: var(--knocks-white);
    font-weight: 500;
  }
</style>
