<div id="engine-taskswitcher" class="engine-taskswitcher hidden">

  <div class="ts-header">
    <h2 class="knocks-title">TASKS</h2>
    <div class="knocks-divider"></div>
  </div>

  <div id="ts-cards" class="ts-cards"></div>

</div>

<script>
  const TASKS = new Map();

  function registerTask(id, title) {
    TASKS.set(id, { id, title });
    renderTaskCards();
  }

  function closeTask(id) {
    TASKS.delete(id);
    renderTaskCards();
  }

    const container = document.getElementById("ts-cards");
    if (!container) return;

    container.innerHTML = "";

        </div>
        <button class="ts-open">Open</button>
      `;
