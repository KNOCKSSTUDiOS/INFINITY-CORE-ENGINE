name: Bug Report
description: Report a bug in the INFINITY-CORE-ENGINE, OS, AI, Render, or Pipeline.
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide exact steps to trigger the bug.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: Paste any relevant logs, errors, or console output.
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Describe the environment (Codespace, local, OS desktop, etc.)
    validations:
      required: false
